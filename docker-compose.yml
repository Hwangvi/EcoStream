version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ecostream
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ambientalPassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backEnd/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecostream"]
      interval: 5s
      timeout: 5s
      retries: 5

  ecostream_redis:
    image: redis:alpine
    restart: always

  ecostream_kafka:
    image: apache/kafka:latest
    container_name: ecostream_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://ecostream_kafka:9092'
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@ecostream_kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build: ./backEnd
    restart: always
    env_file: .env
    depends_on:
      postgres_db: {condition: service_healthy}
      ecostream_kafka: {condition: service_started}