version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: ecostream_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend  # Como tu Dockerfile está en la raíz, usamos '.'
    container_name: ecostream_api
    depends_on:
      - postgres_db
      - kafka
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend 
    container_name: ecostream_web
    ports:
      - "5173:80"
    depends_on:
      - backend

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: ecostream_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: ecostream_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092

volumes:
  postgres_data: