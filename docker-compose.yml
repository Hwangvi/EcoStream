version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ecostream
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ambientalPassword
    volumes:
      - pgdata:/var/lib/postgresql/data

  ecostream_redis:
    image: redis:alpine
    restart: always

  ecostream_kafka:
    image: bitnami/kafka:latest
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://ecostream_kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@ecostream_kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres_db
      - ecostream_kafka
      - ecostream_redis
    environment:
      DB_HOST: postgres_db
      KAFKA_SERVER: ecostream_kafka:9092
      REDIS_HOST: ecostream_redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"

volumes:
  pgdata: